name: Update OSS Contributions

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-oss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch OSS contributions and render section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          FROM=$(date -u -d '1 year ago' +%Y-%m-%dT%H:%M:%SZ)
          TO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FROM_DATE=${FROM%%T*}

          # Merged PRs via search (last 12 months)
          gh api graphql \
            -F q="author:$USERNAME is:pr is:merged merged:>=$FROM_DATE" \
            -f query='
              query($q: String!) {
                search(query: $q, type: ISSUE, first: 100) {
                  issueCount
                  nodes {
                    ... on PullRequest {
                      repository { nameWithOwner stargazerCount url owner { login } }
                    }
                  }
                }
              }' > merged_prs.json

          # Reviews + issues + totals via contributionsCollection
          gh api graphql \
            -F username="$USERNAME" \
            -F from="$FROM" \
            -F to="$TO" \
            -f query='
              query($username: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $username) {
                  contributionsCollection(from: $from, to: $to) {
                    totalPullRequestReviewContributions
                    totalIssueContributions
                    pullRequestReviewContributionsByRepository(maxRepositories: 50) {
                      repository { nameWithOwner stargazerCount url owner { login } }
                      contributions { totalCount }
                    }
                    issueContributionsByRepository(maxRepositories: 50) {
                      repository { nameWithOwner stargazerCount url owner { login } }
                      contributions { totalCount }
                    }
                  }
                }
              }' > contribs.json

          jq --arg user "$USERNAME" \
             --slurpfile prs merged_prs.json \
             -r '
            .data.user.contributionsCollection as $c

            # Merged PR rows grouped by repo
            | ($prs[0].data.search.nodes
                | map(select(.repository.owner.login != $user))
                | group_by(.repository.nameWithOwner)
                | map({
                    repo: .[0].repository.nameWithOwner,
                    url: .[0].repository.url,
                    stars: .[0].repository.stargazerCount,
                    merged_prs: length, reviews: 0, issues: 0
                  })) as $prRows

            | def contribRows(field; key):
                ($c[field] // [])
                | map(select(.repository.owner.login != $user))
                | map({
                    repo: .repository.nameWithOwner,
                    url: .repository.url,
                    stars: .repository.stargazerCount,
                    merged_prs: 0, reviews: 0, issues: 0,
                    (key): .contributions.totalCount
                  });

            ($prRows
              + contribRows("pullRequestReviewContributionsByRepository"; "reviews")
              + contribRows("issueContributionsByRepository"; "issues"))
            | group_by(.repo)
            | map(
                (.[0] | {repo, url, stars})
                + (reduce .[] as $x ({merged_prs:0, reviews:0, issues:0};
                    .merged_prs += $x.merged_prs
                    | .reviews += $x.reviews
                    | .issues += $x.issues))
              )
            | map(. + {total: (.merged_prs + .reviews + .issues)})
            | map(select(.total > 0))
            | sort_by(-.total, -.stars)
            | .[:10] as $top

            | ($prs[0].data.search.nodes
                | map(select(.repository.owner.login != $user)) | length) as $mergedTotal

            | "| Repository | ⭐ | Merged PRs | Reviews | Issues |",
              "| --- | ---: | ---: | ---: | ---: |",
              ($top[] | "| [\(.repo)](\(.url)) | \(.stars) | \(.merged_prs) | \(.reviews) | \(.issues) |"),
              "",
              "**Totals (all public OSS):** \($mergedTotal) merged PRs · \($c.totalPullRequestReviewContributions) reviews · \($c.totalIssueContributions) issues",
              "",
              "_Last updated: \(now | strftime("%Y-%m-%d"))_"
          ' contribs.json > oss.md

          awk '
            /<!-- oss-start -->/ { print; print ""; while ((getline line < "oss.md") > 0) print line; print ""; skip=1; next }
            /<!-- oss-end -->/   { skip=0 }
            !skip { print }
          ' README.md > README.new && mv README.new README.md

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update OSS contributions"
          git push
